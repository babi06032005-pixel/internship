server.port=8080
spring.application.name=bookmate

# H2 (dev - default)
spring.datasource.url=jdbc:h2:mem:bookmate_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL (prod) - uncomment and fill:
# spring.datasource.url=jdbc:mysql://localhost:3306/bookmate_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
bookmate.upload.dir=uploads

bookmate.jwt.secret=BookMateSecretKey2024VeryLongSecureKeyForHMACSHA256Algorithm
bookmate.jwt.expiration=86400000

bookmate.openai.api-key=${OPENAI_API_KEY:sk-demo-key}
bookmate.openai.model=gpt-3.5-turbo
bookmate.openai.base-url=https://api.openai.com/v1

bookmate.google.books.api-key=${GOOGLE_BOOKS_API_KEY:demo-key}
bookmate.google.books.base-url=https://www.googleapis.com/books/v1

bookmate.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:8080

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
